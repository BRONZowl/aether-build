# Aether project runtime defaults (sample).
# Loaded at process start and merged (low→high): defaults → ~/.grok/config.toml → this file → CLI.
# Only the sections/keys below are read by Aether. Extra Grok product keys may live in
# ~/.grok/config.toml for the Rust CLI; they are ignored here unless listed.
# Secrets stay in ~/.grok/auth.json — never commit tokens.

# Loaded: [models] default, default_reasoning_effort
[models]
default = "grok-4.5"
default_reasoning_effort = "medium"

# Loaded: permission_mode, yolo, auto_compact, auto_compact_pct, theme, vim_mode, compact_mode, timestamps
[ui]
permission_mode = "always-approve"
yolo = false
compact_mode = false
vim_mode = true
theme = "tokyonight"
# timestamps = false

# Loaded: [compact] enabled, threshold_pct / auto_compact_pct
# [compact]
# enabled = true
# threshold_pct = 80

# Loaded: [agent] max_turns
# [agent]
# max_turns = 20

# Loaded: [memory] enabled, auto_dream; [memory.initial_injection] enabled
[memory]
enabled = true
# auto_dream = true

[memory.initial_injection]
enabled = true

# Loaded: [subagents] enabled only (max/types/models are Grok-side; ignored)
[subagents]
enabled = true

# Loaded: [permission] allow / deny (Bash/Edit rule globs)
[permission]
allow = [
    "Bash(git *)",
    "Bash(gh *)",
    "Bash(ruff *)",
    "Bash(pyright *)",
    "Bash(stylua *)",
    "Bash(shfmt *)",
    "Bash(clang-format *)",
    "Bash(make *)",
    "Bash(npm *)",
    "Bash(cargo *)",
    "Bash(pytest *)",
    "Bash(python -m pytest *)",
    "Bash(./scripts/*)",
    "Bash(odin *)",
    "Bash(odinfmt *)",
    "Bash(.tools/bin/*)",
]
deny = [
    "Bash(rm -rf /)",
    "Bash(rm -rf /*)",
    "Bash(sudo rm *)",
    "Bash(mkfs *)",
    "Bash(dd if=*)",
]
